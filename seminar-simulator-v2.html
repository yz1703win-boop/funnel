<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セミナー売上シミュレーター v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-blue-900 min-h-screen p-4 md:p-8">
<div class="max-w-7xl mx-auto">

  <div class="text-center mb-8">
    <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight mb-1">セミナー売上シミュレーター</h1>
    <p class="text-blue-300 text-sm">申込人数を変更すると目標金額に合わせてプラチナコースが自動調整されます</p>
  </div>

  <!-- Fixed Target -->
  <div class="bg-gradient-to-r from-blue-600/30 to-indigo-600/30 border border-blue-400/40 rounded-2xl p-4 mb-5 text-center">
    <p class="text-blue-300 text-xs font-bold uppercase tracking-widest mb-1">売上目標（固定）</p>
    <p class="text-5xl font-black text-white">1.4<span class="text-2xl font-bold ml-1">億円</span></p>
    <p class="text-blue-300/60 text-xs mt-1">税抜 14,000万円</p>
  </div>

  <!-- Settings -->
  <div class="bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 p-6 mb-5">
    <div class="flex items-center mb-5">
      <div class="w-1 h-6 bg-blue-400 rounded-full mr-3"></div>
      <h2 class="text-white font-bold text-lg">コース設定</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
      <div class="bg-emerald-500/10 border border-emerald-400/25 rounded-xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-3 h-3 rounded-full bg-emerald-400"></span>
          <label class="text-emerald-200 text-xs font-bold uppercase tracking-widest">通常コース単価（税抜）</label>
        </div>
        <div class="relative">
          <input type="number" id="normalPrice" value="54" min="0" oninput="updateAll()"
            class="w-full bg-white/15 text-white text-xl font-bold border border-emerald-400/30 rounded-xl px-4 py-3 pr-14 focus:outline-none focus:border-emerald-400 transition">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 text-sm">万円</span>
        </div>
        <p class="text-emerald-300/60 text-xs mt-2">入金率 90%</p>
      </div>
      <div class="bg-amber-500/10 border border-amber-400/25 rounded-xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-3 h-3 rounded-full bg-amber-400"></span>
          <label class="text-amber-200 text-xs font-bold uppercase tracking-widest">プラチナコース単価（税抜）</label>
        </div>
        <div class="relative">
          <input type="number" id="platPrice" value="88" min="0" oninput="updateAll()"
            class="w-full bg-white/15 text-white text-xl font-bold border border-amber-400/30 rounded-xl px-4 py-3 pr-14 focus:outline-none focus:border-amber-400 transition">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 text-sm">万円</span>
        </div>
        <p class="text-amber-300/60 text-xs mt-2">入金率 85%</p>
      </div>
      <div class="bg-rose-500/10 border border-rose-400/25 rounded-xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-3 h-3 rounded-full bg-rose-400"></span>
          <label class="text-rose-200 text-xs font-bold uppercase tracking-widest">合宿コース単価（税抜）</label>
        </div>
        <div class="relative">
          <input type="number" id="campPrice" value="110" min="0" oninput="updateAll()"
            class="w-full bg-white/15 text-white text-xl font-bold border border-rose-400/30 rounded-xl px-4 py-3 pr-14 focus:outline-none focus:border-rose-400 transition">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 text-sm">万円</span>
        </div>
        <p class="text-rose-300/60 text-xs mt-2">入金率 80%</p>
      </div>
    </div>

    <div class="bg-purple-500/15 border border-purple-400/30 rounded-xl p-4 mb-4">
      <div class="flex items-start gap-3">
        <span class="text-purple-300 text-lg">📄</span>
        <div>
          <p class="text-purple-200 font-bold text-sm mb-1">講師報酬（契約書より自動計算）</p>
          <div class="flex flex-wrap gap-4 text-xs text-purple-300">
            <span>売上税込 ～5,500万: <strong class="text-white">30%</strong></span>
            <span>5,500万～1億: <strong class="text-white">25%</strong></span>
            <span>1億超: <strong class="text-white">20%</strong></span>
          </div>
          <p class="text-purple-300/70 text-xs mt-1">＊広告費・会場代・交通費・諸経費の30%は講師負担として控除　＊音叉代は別途計上</p>
        </div>
      </div>
    </div>

    <div class="bg-cyan-500/10 border border-cyan-400/25 rounded-xl p-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-cyan-200 text-sm">🏢</span>
        <p class="text-cyan-200 font-bold text-sm">会場代（月120万固定）— コース別開催月数</p>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-emerald-200 text-xs font-semibold mb-2">通常コース 開催月数</label>
          <div class="relative">
            <input type="number" id="normalMonths" value="4" min="1" max="24" oninput="updateAll()"
              class="w-full bg-white/15 text-white border border-emerald-400/30 rounded-xl px-3 py-3 pr-12 focus:outline-none focus:border-emerald-400 transition text-lg font-bold">
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 text-xs">ヶ月</span>
          </div>
          <p class="text-white/30 text-xs mt-1">→ 会場費 <span id="venueNormLabel">480</span>万円</p>
        </div>
        <div>
          <label class="block text-amber-200 text-xs font-semibold mb-2">プラチナコース 開催月数</label>
          <div class="relative">
            <input type="number" id="platMonths" value="3" min="1" max="24" oninput="updateAll()"
              class="w-full bg-white/15 text-white border border-amber-400/30 rounded-xl px-3 py-3 pr-12 focus:outline-none focus:border-amber-400 transition text-lg font-bold">
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 text-xs">ヶ月</span>
          </div>
          <p class="text-white/30 text-xs mt-1">→ 会場費 <span id="venuePlatLabel">360</span>万円</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 pl-2">
    <button id="btn100" onclick="switchTab(100)" class="px-6 py-3 rounded-t-xl font-bold text-sm transition-all bg-white text-indigo-700 shadow-lg">🎯 100% 達成</button>
    <button id="btn120" onclick="switchTab(120)" class="px-6 py-3 rounded-t-xl font-bold text-sm transition-all bg-white/20 text-white/60 hover:bg-white/30 hover:text-white">🚀 120% 達成</button>
    <button id="btn150" onclick="switchTab(150)" class="px-6 py-3 rounded-t-xl font-bold text-sm transition-all bg-white/20 text-white/60 hover:bg-white/30 hover:text-white">⚡ 150% 達成</button>
  </div>
  <div id="tabContent" class="bg-white rounded-b-2xl rounded-tr-2xl shadow-2xl p-6 min-h-48"></div>

</div>
<script>
  const TARGET = 14000;
  const NORM_PAY_RATE = 0.90;
  const PLAT_PAY_RATE = 0.85;
  const CAMP_PAY_RATE = 0.80;
  const CAMP_DEFAULTS = { 100: 11, 120: 20, 150: 30 };

  // lastEdited: 'norm' → 通常固定・プラチナAUTO / 'plat' → プラチナ固定・通常AUTO
  let tabState = {
    100: { normSignup: null, platSignup: null, campPaid: 11, lastEdited: 'norm' },
    120: { normSignup: null, platSignup: null, campPaid: 20, lastEdited: 'norm' },
    150: { normSignup: null, platSignup: null, campPaid: 30, lastEdited: 'norm' },
  };
  let currentTab = 100;

  function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
  function fmt(n) {
    if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + ' 億円';
    return n.toFixed(1) + ' 万円';
  }
  function fmtM(n) { return n.toFixed(1) + ' 万円'; }

  function calcInstrFee(rTax) {
    const A = 5500, B = 10000;
    if (rTax <= A) return rTax * 0.30;
    if (rTax <= B) return A * 0.30 + (rTax - A) * 0.25;
    return A * 0.30 + (B - A) * 0.25 + (rTax - B) * 0.20;
  }
  function instrFeeRate(rTax) {
    if (rTax <= 5500) return 30;
    if (rTax <= 10000) return 25;
    return 20;
  }

  function calc(rate) {
    const normalPrice  = v('normalPrice');
    const platPrice    = v('platPrice');
    const campPrice    = v('campPrice');
    const normalMonths = v('normalMonths') || 4;
    const platMonths   = v('platMonths')   || 3;
    const targetRev    = TARGET * rate / 100;
    const state        = tabState[rate];
    const campPaid     = state.campPaid;
    const campSignup   = Math.ceil(campPaid / CAMP_PAY_RATE);
    const campRevenue  = campPaid * campPrice;

    let normSignup, normPaid, normRevenue, platSignup, platPaid, platRevenue;

    if (state.normSignup === null && state.platSignup === null) {
      // 初期：2:3 比率で自動配分
      const nonCampTarget = targetRev - campRevenue;
      const avgPaid = (2 * normalPrice + 3 * platPrice) / 5;
      const nonCampPaid = avgPaid > 0 ? Math.ceil(nonCampTarget / avgPaid) : 0;
      normPaid    = Math.round(nonCampPaid * 2 / 5);
      platPaid    = nonCampPaid - normPaid;
      normSignup  = Math.ceil(normPaid / NORM_PAY_RATE);
      platSignup  = Math.ceil(platPaid / PLAT_PAY_RATE);
      normRevenue = normPaid * normalPrice;
      platRevenue = platPaid * platPrice;
      state.normSignup = normSignup;
      state.platSignup = platSignup;
    } else if (state.lastEdited === 'norm') {
      // 通常固定 → プラチナ AUTO
      normSignup  = state.normSignup;
      normPaid    = Math.floor(normSignup * NORM_PAY_RATE);
      normRevenue = normPaid * normalPrice;
      const remain = targetRev - campRevenue - normRevenue;
      platPaid    = platPrice > 0 ? Math.max(0, Math.ceil(remain / platPrice)) : 0;
      platSignup  = Math.ceil(platPaid / PLAT_PAY_RATE);
      platRevenue = platPaid * platPrice;
      state.platSignup = platSignup;
    } else {
      // プラチナ固定 → 通常 AUTO
      platSignup  = state.platSignup;
      platPaid    = Math.floor(platSignup * PLAT_PAY_RATE);
      platRevenue = platPaid * platPrice;
      const remain = targetRev - campRevenue - platRevenue;
      normPaid    = normalPrice > 0 ? Math.max(0, Math.ceil(remain / normalPrice)) : 0;
      normSignup  = Math.ceil(normPaid / NORM_PAY_RATE);
      normRevenue = normPaid * normalPrice;
      state.normSignup = normSignup;
    }

    const totalSignup = normSignup + platSignup + campSignup;
    const totalPaid   = normPaid + platPaid + campPaid;
    const rTotal      = normRevenue + platRevenue + campRevenue;
    const rTotalTax   = rTotal * 1.1;
    const achRate     = targetRev > 0 ? rTotal / targetRev * 100 : 0;

    const eAdv        = 1500;
    const eVenueNorm  = 120 * normalMonths;
    const eVenuePlat  = 120 * platMonths;
    const eVenueTotal = eVenueNorm + eVenuePlat;
    const eCamp       = 10;
    const ePromo      = 100;
    const eMisc       = 250;
    const eTuning     = 20 * (platPaid + campPaid) / 2;
    const instrGross     = calcInstrFee(rTotalTax);
    const appliedRate    = instrFeeRate(rTotalTax);
    const expForSharing  = eAdv + eVenueTotal + ePromo + eMisc;
    const instrExpBurden = expForSharing * 0.30;
    const instrNet       = Math.max(0, instrGross - instrExpBurden);
    const eTotal     = eAdv + eVenueTotal + eCamp + ePromo + eMisc + eTuning + instrNet;
    const profit     = rTotal - eTotal;
    const profitRate = rTotal > 0 ? profit / rTotal * 100 : 0;

    return {
      rate, targetRev,
      normSignup, normPaid, platSignup, platPaid, campSignup, campPaid,
      totalSignup, totalPaid,
      rNorm: normRevenue, rPlat: platRevenue, rCamp: campRevenue,
      rTotal, rTotalTax, achRate,
      eAdv, eVenueNorm, eVenuePlat, eVenueTotal, eCamp, ePromo, eMisc, eTuning,
      instrGross, instrExpBurden, instrNet, appliedRate, expForSharing,
      eTotal, profit, profitRate,
      normalPrice, platPrice, campPrice, normalMonths, platMonths
    };
  }

  function render() {
    const focusedId = document.activeElement ? document.activeElement.id : null;
    const ae = document.activeElement;
    const selStart = ae && ae.selectionStart !== undefined ? ae.selectionStart : null;
    const selEnd   = ae && ae.selectionEnd   !== undefined ? ae.selectionEnd   : null;

    const d = calc(currentTab);
    const pos    = d.profit >= 0;
    const pColor = pos ? 'text-emerald-600' : 'text-red-600';
    const pBg    = pos ? 'bg-emerald-50 border-emerald-300' : 'bg-red-50 border-red-300';
    const ta = {
      100: { badge: 'bg-indigo-600', text: 'text-indigo-700', light: 'bg-indigo-50 border-indigo-200', ring: 'border-indigo-300' },
      120: { badge: 'bg-sky-600',    text: 'text-sky-700',    light: 'bg-sky-50 border-sky-200',       ring: 'border-sky-300'    },
      150: { badge: 'bg-purple-600', text: 'text-purple-700', light: 'bg-purple-50 border-purple-200', ring: 'border-purple-300' },
    }[currentTab];

    document.getElementById('tabContent').innerHTML = `
      <div class="flex flex-wrap items-center justify-between gap-3 mb-6 pb-4 border-b border-gray-100">
        <div class="flex items-center gap-3">
          <span class="inline-flex items-center px-4 py-1.5 rounded-full ${ta.badge} text-white text-sm font-black">${currentTab}% 達成シナリオ</span>
          <span class="text-gray-400 text-sm">目標売上 <span class="font-bold text-gray-600">${fmtM(d.targetRev)}</span></span>
        </div>
        <div class="text-right">
          <p class="text-gray-400 text-xs">達成率</p>
          <p class="text-2xl font-black ${ta.text}">${d.achRate.toFixed(1)}%</p>
        </div>
      </div>

      <!-- 申込人数入力 -->
      <div class="bg-gray-50 rounded-2xl border border-gray-200 p-5 mb-6">
        <div class="flex items-center justify-between mb-4">
          <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">📝 申込人数 設定</p>
          <p class="text-gray-400 text-xs">変更した方が固定 → もう一方が <span class="bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded font-bold text-xs">AUTO</span> で自動調整</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white border-2 ${tabState[currentTab].lastEdited === 'plat' ? 'border-emerald-300 ring-2 ring-emerald-100' : 'border-emerald-200'} rounded-xl p-4 relative">
            ${tabState[currentTab].lastEdited === 'plat' ? '<span class="absolute -top-2.5 left-3 text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold">AUTO</span>' : ''}
            <p class="text-emerald-600 text-xs font-bold mb-2">通常コース 申込人数</p>
            <input type="number" id="normSignupInput_${currentTab}" value="${d.normSignup}" min="0"
              oninput="onNormChange(${currentTab}, this.value)"
              class="w-full border border-emerald-300 rounded-lg px-3 py-3 text-2xl font-black text-gray-800 focus:outline-none focus:border-emerald-500 text-center ${tabState[currentTab].lastEdited === 'plat' ? 'bg-emerald-50' : 'bg-white'}">
            <p class="text-gray-400 text-xs text-center mt-2">→ 入金 <strong class="text-emerald-600">${d.normPaid}</strong> 名</p>
          </div>
          <div class="bg-white border-2 ${tabState[currentTab].lastEdited === 'norm' ? 'border-amber-300 ring-2 ring-amber-100' : 'border-amber-200'} rounded-xl p-4 relative">
            ${tabState[currentTab].lastEdited === 'norm' ? '<span class="absolute -top-2.5 left-3 text-xs bg-amber-500 text-white px-2 py-0.5 rounded-full font-bold">AUTO</span>' : ''}
            <p class="text-amber-600 text-xs font-bold mb-2">プラチナコース 申込人数</p>
            <input type="number" id="platSignupInput_${currentTab}" value="${d.platSignup}" min="0"
              oninput="onPlatChange(${currentTab}, this.value)"
              class="w-full border border-amber-300 rounded-lg px-3 py-3 text-2xl font-black text-gray-800 focus:outline-none focus:border-amber-500 text-center ${tabState[currentTab].lastEdited === 'norm' ? 'bg-amber-50' : 'bg-white'}">
            <p class="text-gray-400 text-xs text-center mt-2">→ 入金 <strong class="text-amber-600">${d.platPaid}</strong> 名</p>
          </div>
          <div class="bg-white border-2 border-rose-200 rounded-xl p-4">
            <p class="text-rose-600 text-xs font-bold mb-2">合宿コース 入金人数</p>
            <input type="number" id="campPaidInput_${currentTab}" value="${d.campPaid}" min="0"
              oninput="onCampChange(${currentTab}, this.value)"
              class="w-full border border-rose-300 rounded-lg px-3 py-3 text-2xl font-black text-gray-800 focus:outline-none focus:border-rose-500 text-center">
            <p class="text-gray-400 text-xs text-center mt-2">→ 申込 <strong class="text-rose-600">${d.campSignup}</strong> 名</p>
          </div>
        </div>
        <p class="text-gray-400 text-xs mt-3 text-center">通常 or プラチナを変更した方が固定され、もう一方が目標金額に合わせて自動調整されます</p>
      </div>

      <!-- 集客人数 -->
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="rounded-2xl border-2 border-blue-200 bg-blue-50 p-5 text-center">
          <p class="text-blue-500 text-xs font-bold uppercase tracking-widest mb-2">目標集客人数（申込ベース）</p>
          <p class="text-5xl font-black text-blue-800">${d.totalSignup}<span class="text-xl font-normal ml-1">名</span></p>
          <p class="text-blue-400 text-xs mt-2">通常${d.normSignup} + プラチナ${d.platSignup} + 合宿${d.campSignup}</p>
        </div>
        <div class="rounded-2xl border-2 ${ta.ring} ${ta.light} p-5 text-center">
          <p class="${ta.text} text-xs font-bold uppercase tracking-widest mb-2">目標集客人数（入金ベース）</p>
          <p class="text-5xl font-black ${ta.text}">${d.totalPaid}<span class="text-xl font-normal ml-1">名</span></p>
          <p class="${ta.text} opacity-60 text-xs mt-2">通常${d.normPaid} + プラチナ${d.platPaid} + 合宿${d.campPaid}</p>
        </div>
      </div>

      <!-- コース別 -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
        <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-4">
          <p class="text-emerald-600 text-xs font-bold mb-3">通常コース <span class="font-normal text-gray-400">（入金率90%）</span></p>
          <div class="flex items-center justify-center gap-3">
            <div class="text-center"><p class="text-gray-400 text-xs mb-1">申込</p><p class="text-3xl font-black text-gray-700">${d.normSignup}<span class="text-sm ml-1">名</span></p></div>
            <div class="text-gray-300 text-xl">→</div>
            <div class="text-center"><p class="text-emerald-600 text-xs mb-1 font-semibold">入金</p><p class="text-3xl font-black text-emerald-700">${d.normPaid}<span class="text-sm ml-1">名</span></p></div>
          </div>
          <p class="text-gray-400 text-xs text-center mt-2">${fmtM(d.normalPrice)} / 名 → <strong>${fmtM(d.rNorm)}</strong></p>
        </div>
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
          <p class="text-amber-600 text-xs font-bold mb-3">プラチナコース <span class="font-normal text-gray-400">（入金率85%）</span></p>
          <div class="flex items-center justify-center gap-3">
            <div class="text-center"><p class="text-gray-400 text-xs mb-1">申込</p><p class="text-3xl font-black text-gray-700">${d.platSignup}<span class="text-sm ml-1">名</span></p></div>
            <div class="text-gray-300 text-xl">→</div>
            <div class="text-center"><p class="text-amber-600 text-xs mb-1 font-semibold">入金</p><p class="text-3xl font-black text-amber-700">${d.platPaid}<span class="text-sm ml-1">名</span></p></div>
          </div>
          <p class="text-gray-400 text-xs text-center mt-2">${fmtM(d.platPrice)} / 名 → <strong>${fmtM(d.rPlat)}</strong></p>
        </div>
        <div class="bg-rose-50 border border-rose-200 rounded-2xl p-4">
          <p class="text-rose-600 text-xs font-bold mb-3">合宿コース <span class="font-normal text-gray-400">（入金率80%）</span></p>
          <div class="flex items-center justify-center gap-3">
            <div class="text-center"><p class="text-gray-400 text-xs mb-1">申込</p><p class="text-3xl font-black text-gray-700">${d.campSignup}<span class="text-sm ml-1">名</span></p></div>
            <div class="text-gray-300 text-xl">→</div>
            <div class="text-center"><p class="text-rose-600 text-xs mb-1 font-semibold">入金</p><p class="text-3xl font-black text-rose-700">${d.campPaid}<span class="text-sm ml-1">名</span></p></div>
          </div>
          <p class="text-gray-400 text-xs text-center mt-2">${fmtM(d.campPrice)} / 名 → <strong>${fmtM(d.rCamp)}</strong></p>
        </div>
      </div>

      <!-- 売上 / 経費 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div>
          <h3 class="font-bold text-gray-600 text-sm uppercase tracking-widest mb-3">売上内訳（入金ベース・税抜）</h3>
          <div class="space-y-2.5">
            <div class="flex justify-between items-center px-4 py-3 rounded-xl bg-emerald-50 border border-emerald-200">
              <div><span class="text-emerald-700 font-semibold text-sm">通常コース</span><span class="text-emerald-400 text-xs ml-2">${d.normPaid}名 × ${fmtM(d.normalPrice)}</span></div>
              <span class="font-bold text-gray-800">${fmtM(d.rNorm)}</span>
            </div>
            <div class="flex justify-between items-center px-4 py-3 rounded-xl bg-amber-50 border border-amber-200">
              <div><span class="text-amber-700 font-semibold text-sm">プラチナコース</span><span class="text-amber-400 text-xs ml-2">${d.platPaid}名 × ${fmtM(d.platPrice)}</span></div>
              <span class="font-bold text-gray-800">${fmtM(d.rPlat)}</span>
            </div>
            <div class="flex justify-between items-center px-4 py-3 rounded-xl bg-rose-50 border border-rose-200">
              <div><span class="text-rose-700 font-semibold text-sm">合宿コース</span><span class="text-rose-400 text-xs ml-2">${d.campPaid}名 × ${fmtM(d.campPrice)}</span></div>
              <span class="font-bold text-gray-800">${fmtM(d.rCamp)}</span>
            </div>
            <div class="flex justify-between items-center px-4 py-3 rounded-xl ${ta.light} border">
              <span class="${ta.text} font-bold text-sm">売上合計（税抜）</span>
              <span class="font-black ${ta.text} text-lg">${fmtM(d.rTotal)}</span>
            </div>
            <div class="flex justify-between items-center px-4 py-2 rounded-xl bg-gray-50 border border-gray-100">
              <span class="text-gray-400 text-xs">売上合計（税込・講師報酬計算用）</span>
              <span class="text-gray-500 text-sm font-medium">${fmtM(d.rTotalTax)}</span>
            </div>
          </div>
        </div>
        <div>
          <h3 class="font-bold text-gray-600 text-sm uppercase tracking-widest mb-3">経費内訳</h3>
          <div class="space-y-2">
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-gray-50">
              <div><span class="text-gray-700 text-sm">広告費（税込）</span><span class="text-gray-400 text-xs ml-2">固定</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.eAdv)}</span>
            </div>
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-emerald-50/50 border border-emerald-100">
              <div><span class="text-gray-700 text-sm">会場代（通常）</span><span class="text-emerald-500 text-xs ml-2">月120万×${d.normalMonths}ヶ月</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.eVenueNorm)}</span>
            </div>
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-amber-50/50 border border-amber-100">
              <div><span class="text-gray-700 text-sm">会場代（プラチナ）</span><span class="text-amber-500 text-xs ml-2">月120万×${d.platMonths}ヶ月</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.eVenuePlat)}</span>
            </div>
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-gray-50">
              <div><span class="text-gray-700 text-sm">合宿経費</span><span class="text-gray-400 text-xs ml-2">固定</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.eCamp)}</span>
            </div>
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-gray-50">
              <div><span class="text-gray-700 text-sm">プロモ交通費</span><span class="text-gray-400 text-xs ml-2">固定</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.ePromo)}</span>
            </div>
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-gray-50">
              <div><span class="text-gray-700 text-sm">諸経費</span><span class="text-gray-400 text-xs ml-2">固定</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.eMisc)}</span>
            </div>
            <div class="flex justify-between items-center px-3 py-2.5 rounded-lg bg-teal-50 border border-teal-100">
              <div><span class="text-teal-700 text-sm">音叉代（半額計上）</span><span class="text-teal-400 text-xs ml-2">20万×${d.platPaid + d.campPaid}名の50%</span></div>
              <span class="text-gray-800 font-semibold text-sm">${fmtM(d.eTuning)}</span>
            </div>
            <div class="rounded-xl border border-purple-200 overflow-hidden mt-1">
              <div class="bg-purple-50 px-3 py-2 flex justify-between items-center">
                <div><span class="text-purple-700 text-sm font-semibold">講師報酬（総額）</span><span class="text-purple-400 text-xs ml-2">税込売上×${d.appliedRate}%</span></div>
                <span class="text-purple-700 font-bold text-sm">${fmtM(d.instrGross)}</span>
              </div>
              <div class="bg-purple-50/50 px-3 py-1.5 flex justify-between items-center border-t border-purple-100">
                <div><span class="text-purple-500 text-xs">　▸ 講師の経費負担（控除）</span><span class="text-purple-300 text-xs ml-1">経費${fmtM(d.expForSharing)}×30%</span></div>
                <span class="text-purple-500 text-xs font-medium">－${fmtM(d.instrExpBurden)}</span>
              </div>
              <div class="bg-purple-100 px-3 py-2 flex justify-between items-center border-t border-purple-200">
                <span class="text-purple-700 text-sm font-bold">講師報酬（甲支払い）</span>
                <span class="text-purple-700 font-black text-sm">${fmtM(d.instrNet)}</span>
              </div>
            </div>
            <div class="flex justify-between items-center px-3 py-3 rounded-xl bg-red-50 border border-red-200 mt-1">
              <span class="text-red-600 font-bold text-sm">経費合計</span>
              <span class="text-red-600 font-black">${fmtM(d.eTotal)}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- サマリー -->
      <div class="rounded-2xl border-2 ${pBg} p-5">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
          <div class="p-3">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">売上高（税抜）</p>
            <p class="text-xl md:text-2xl font-black text-gray-800">${fmt(d.rTotal)}</p>
          </div>
          <div class="p-3">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">経費合計</p>
            <p class="text-xl md:text-2xl font-black text-red-500">${fmt(d.eTotal)}</p>
          </div>
          <div class="p-3 md:border-x border-gray-200">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">粗利</p>
            <p class="text-2xl md:text-3xl font-black ${pColor}">${fmt(d.profit)}</p>
            <p class="text-sm ${pColor} font-semibold mt-0.5">粗利率 ${d.profitRate.toFixed(1)}%</p>
          </div>
          <div class="p-3">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">目標達成率</p>
            <p class="text-xl md:text-2xl font-black ${ta.text}">${d.achRate.toFixed(1)}%</p>
            <p class="text-xs text-gray-400 mt-0.5">目標: 14,000万円</p>
          </div>
        </div>
      </div>
    `;

    if (focusedId) {
      const el = document.getElementById(focusedId);
      if (el) {
        el.focus();
        if (selStart !== null) { try { el.setSelectionRange(selStart, selEnd); } catch(e) {} }
      }
    }
  }

  function onNormChange(rate, val) {
    tabState[rate].normSignup = Math.max(0, parseInt(val) || 0);
    tabState[rate].lastEdited = 'norm';
    if (currentTab === rate) render();
  }

  function onPlatChange(rate, val) {
    tabState[rate].platSignup = Math.max(0, parseInt(val) || 0);
    tabState[rate].lastEdited = 'plat';
    if (currentTab === rate) render();
  }

  function onCampChange(rate, val) {
    tabState[rate].campPaid = Math.max(0, parseInt(val) || 0);
    // 合宿変更時は lastEdited をそのまま維持（直前に固定した方に合わせる）
    if (currentTab === rate) render();
  }

  function switchTab(rate) {
    currentTab = rate;
    [100, 120, 150].forEach(r => {
      const btn = document.getElementById('btn' + r);
      if (r === rate) {
        btn.className = 'px-6 py-3 rounded-t-xl font-bold text-sm transition-all bg-white shadow-lg ' +
          (r === 100 ? 'text-indigo-700' : r === 120 ? 'text-sky-700' : 'text-purple-700');
      } else {
        btn.className = 'px-6 py-3 rounded-t-xl font-bold text-sm transition-all bg-white/20 text-white/60 hover:bg-white/30 hover:text-white';
      }
    });
    render();
  }

  function updateAll() {
    const nm = parseFloat(document.getElementById('normalMonths').value) || 4;
    const pm = parseFloat(document.getElementById('platMonths').value) || 3;
    document.getElementById('venueNormLabel').textContent = (120 * nm).toFixed(0);
    document.getElementById('venuePlatLabel').textContent = (120 * pm).toFixed(0);
    tabState = {
      100: { normSignup: null, platSignup: null, campPaid: CAMP_DEFAULTS[100], lastEdited: 'norm' },
      120: { normSignup: null, platSignup: null, campPaid: CAMP_DEFAULTS[120], lastEdited: 'norm' },
      150: { normSignup: null, platSignup: null, campPaid: CAMP_DEFAULTS[150], lastEdited: 'norm' },
    };
    render();
  }

  updateAll();
</script>
</body>
</html>
